name: Lion Animation

on:
  schedule:
    - cron: "0 */12 * * *"  # runs every 12 hours automatically
  workflow_dispatch:         # also allows manual run

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Generate the moving animation SVG
      - uses: Platane/snk@v3
        with:
          github_user_name: rajanmagratitsk          # Your GitHub username
          github_token: ${{ secrets.GITHUB_TOKEN }} # Required
          outputs: |
            dist/github-contribution-grid-snake.svg
          args: --head https://i.imgur.com/8XlM2Qw.png  # Lion image

      # Push the generated SVG to output branch
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
